name: Bug Report
description: Report incorrect results, errors, or unexpected behaviour in HypoTestX
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill every section carefully.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what went wrong and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction snippet
      description: Paste the shortest Python snippet that reproduces the issue.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour (error traceback if any)
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: HypoTestX version
      placeholder: "e.g. 1.0.6  (run: python -c \"import hypotestx; print(hypotestx.__version__)\")"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "e.g. 3.11.2"
    validations:
      required: true
